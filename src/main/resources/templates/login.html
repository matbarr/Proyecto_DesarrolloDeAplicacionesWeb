<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Glaciar Gestion</title>
</head>
<body>
<h1>Glaciar Gestion - Inicio de sesion</h1>

<p th:if="${success}" th:text="${success}" style="color:green"></p>
<p th:if="${error}" th:text="${error}" style="color:red"></p>

<form th:action="@{/login}" th:object="${loginRequest}" method="post">
    <label>Correo:</label>
    <input type="email" th:field="*{correo}" required>
    <br>
    <label>Contrasena:</label>
    <input type="password" th:field="*{contrasena}" required>
    <br>
    <button type="submit">Ingresar</button>
</form>

<p><a th:href="@{/registro}">Crear cuenta de cliente</a></p>
</body>
</html>
